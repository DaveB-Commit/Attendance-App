<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance Portal | DKB Anchor Security Services Ltd</title>
    
    <link rel="icon" type="image/png" href="DKB Anchor Logo.png">
    
    <style>
        /* DKB ANCHOR BRANDING COLORS */
        :root {
            --primary-blue: #002347;
            --accent-gold: #c5a059;
            --success-green: #28a745;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--primary-blue); 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        /* --- LANDING PAGE STYLES --- */
        .landing-container { text-align: center; padding: 20px; width: 100%; max-width: 400px; }
        .company-logo { max-width: 150px; height: auto; margin: 0 auto 20px auto; display: block; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .landing-container h1 { color: var(--white); font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .landing-container .slogan { color: var(--accent-gold); font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; margin-top: 8px; }
        
        .btn-main {
            background-color: var(--accent-gold); color: var(--primary-blue); border: none; padding: 18px; width: 100%; border-radius: 8px;
            font-size: 1.2rem; font-weight: 800; box-shadow: 0 6px 15px rgba(0,0,0,0.4); margin-top: 40px; cursor: pointer; text-transform: uppercase;
        }

        .landing-footer { color: rgba(255,255,255,0.6); font-size: 0.75rem; margin-top: 40px; }

        /* --- MODAL (POPUP) STYLES --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 35, 71, 0.85); backdrop-filter: blur(5px);
            z-index: 1000; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box;
        }
        .modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .attendance-card {
            background: var(--white); padding: 25px 20px; border-radius: 12px; width: 100%; max-width: 420px; border-top: 8px solid var(--accent-gold);
            position: relative; max-height: 95vh; overflow-y: auto;
        }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; color: #999; cursor: pointer; line-height: 1; }
        
        /* TABS INSIDE MODAL */
        .modal-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: bold; color: #999; cursor: pointer; font-size: 0.85rem; }
        .tab-btn.active { color: var(--primary-blue); border-bottom: 3px solid var(--accent-gold); }

        /* --- FORM STYLES --- */
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-weight: 700; margin-bottom: 6px; font-size: 0.8rem; color: var(--primary-blue); }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #dce0e4; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }

        /* --- LIVE CAMERA STYLES --- */
        .camera-box {
            background: #fdfdfd; border: 2px dashed var(--accent-gold); border-radius: 10px; padding: 15px; text-align: center; cursor: pointer;
        }
        .camera-text { font-size: 0.85rem; font-weight: 600; color: var(--primary-blue); }
        #videoFeed, #photoResult { width: 100%; border-radius: 8px; display: none; margin-top: 10px; }
        .btn-capture { background: var(--accent-gold); color: var(--primary-blue); border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; margin-top: 10px; display: none; cursor: pointer; }

        .btn-submit { background-color: var(--primary-blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-size: 1.1rem; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .btn-submit:disabled { background-color: #a0a0a0; cursor: not-allowed; }

        /* HISTORY CARDS */
        .hist-item { background: #f8f9fa; border-left: 4px solid var(--accent-gold); padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 0.85rem; text-align: left; }
    </style>
</head>
<body>

<div class="landing-container">
    <img src="DKB Anchor Logo.png" alt="DKB Anchor Logo" class="company-logo">
    <h1>DKB Anchor Security</h1>
    <div class="slogan">Integrity, Excellence and Reliability</div>
    <button id="openModalBtn" class="btn-main">Access Shift Log</button>
    <div class="landing-footer">&copy; 2026 DKB Anchor Security Services Ltd.</div>
</div>

<div class="modal-overlay" id="formModal">
    <div class="attendance-card">
        <span class="close-btn" id="closeModalBtn">&times;</span>
        
        <div class="modal-tabs">
            <button class="tab-btn active" id="tabForm">Log Shift</button>
            <button class="tab-btn" id="tabHistory">History</button>
        </div>

        <div id="sectionForm">
            <form id="attendanceForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="guardName" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label>Officer ID</label>
                    <input type="text" id="guardID" placeholder="DKB-XXX" required>
                </div>
                <div class="form-group">
                    <label>Assignment Post</label>
                    <input type="text" id="postLocation" placeholder="Current Location" required>
                </div>
                <div class="form-group">
                    <label>Duty Action</label>
                    <select id="status">
                        <option value="Clock In">Clocking IN</option>
                        <option value="Clock Out">Clocking OUT</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Live Identity Verification</label>
                    <div class="camera-box" id="cameraBox">
                        <span class="camera-text" id="cameraPrompt">📸 Tap to Open Camera</span>
                        <video id="videoFeed" autoplay playsinline></video>
                        <button type="button" id="captureBtn" class="btn-capture">Take Photo</button>
                        <canvas id="photoCanvas" style="display:none;"></canvas>
                        <img id="photoResult" alt="Captured Selfie">
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Submit Entry</button>
            </form>
        </div>

        <div id="sectionHistory" style="display:none;">
            <div class="form-group">
                <label>Enter Officer ID to Search</label>
                <input type="text" id="searchID" placeholder="DKB-XXX">
            </div>
            <button class="btn-submit" id="btnSearch" style="background:var(--accent-gold); color:var(--primary-blue);">Load Recent Logs</button>
            <div id="histContent" style="margin-top:20px;"></div>
        </div>
    </div>
</div>

<script>
    // --- LINKED TO YOUR GOOGLE SCRIPT ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycby70dAxLof8VdCcvRh9dpvSITM5BWZtc_Ahc52-Rl_A1vhoODYci1ELXsmYBM-QUBHV/exec';

    const modal = document.getElementById('formModal');
    const formView = document.getElementById('sectionForm');
    const histView = document.getElementById('sectionHistory');
    const cameraBox = document.getElementById('cameraBox');
    const videoFeed = document.getElementById('videoFeed');
    const captureBtn = document.getElementById('captureBtn');
    const photoResult = document.getElementById('photoResult');
    const cameraPrompt = document.getElementById('cameraPrompt');

    let mediaStream = null;
    let finalBase64Photo = null;

    // Modal Controls
    document.getElementById('openModalBtn').addEventListener('click', () => modal.classList.add('active'));
    document.getElementById('closeModalBtn').addEventListener('click', () => {
        modal.classList.remove('active');
        stopCamera();
    });

    // Tab Switching
    document.getElementById('tabForm').addEventListener('click', (e) => {
        formView.style.display = 'block'; histView.style.display = 'none';
        e.target.classList.add('active'); document.getElementById('tabHistory').classList.remove('active');
    });
    document.getElementById('tabHistory').addEventListener('click', (e) => {
        formView.style.display = 'none'; histView.style.display = 'block';
        e.target.classList.add('active'); document.getElementById('tabForm').classList.remove('active');
    });

    // Camera Logic
    cameraBox.addEventListener('click', async () => {
        if (finalBase64Photo) return;
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            videoFeed.srcObject = mediaStream;
            videoFeed.style.display = 'block';
            captureBtn.style.display = 'block';
            cameraPrompt.style.display = 'none';
        } catch (err) { alert("Camera denied."); }
    });

    captureBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const canvas = document.getElementById('photoCanvas');
        canvas.width = videoFeed.videoWidth; canvas.height = videoFeed.videoHeight;
        canvas.getContext('2d').drawImage(videoFeed, 0, 0);
        finalBase64Photo = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        photoResult.src = canvas.toDataURL('image/jpeg');
        photoResult.style.display = 'block';
        videoFeed.style.display = 'none';
        captureBtn.style.display = 'none';
        stopCamera();
    });

    function stopCamera() {
        if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
    }

    // Submission
    document.getElementById('attendanceForm').addEventListener('submit', function(e) {
        e.preventDefault();
        if (!finalBase64Photo) return alert("Photo required.");
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true; submitBtn.innerText = "Processing GPS...";

        navigator.geolocation.getCurrentPosition((pos) => {
            submitBtn.innerText = "Uploading Log...";
            const payload = {
                name: document.getElementById('guardName').value,
                id: document.getElementById('guardID').value,
                location: document.getElementById('postLocation').value,
                status: document.getElementById('status').value,
                image: finalBase64Photo,
                latitude: pos.coords.latitude, longitude: pos.coords.longitude
            };

            fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
            .then(() => { alert("Log Successful!"); location.reload(); })
            .catch(() => { alert("Error."); submitBtn.disabled = false; });
        }, () => { alert("GPS required."); submitBtn.disabled = false; });
    });

    // History Lookup
    document.getElementById('btnSearch').onclick = async () => {
        const id = document.getElementById('searchID').value;
        const list = document.getElementById('histContent');
        if(!id) return;
        list.innerHTML = "Fetching...";
        try {
            const res = await fetch(`${scriptURL}?action=history&id=${id}`);
            const data = await res.json();
            list.innerHTML = data.length ? data.map(h => `
                <div class="hist-item"><b>${h.status}</b> @ ${h.loc}<br>${new Date(h.time).toLocaleString()}</div>
            `).join('') : "No records found.";
        } catch (e) { list.innerHTML = "Search Error."; }
    };
</script>

</body>
</html>
